<!-- SCRIPT COMPLET CORRIGÉ AVEC WORKER LOCAL -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convertisseur vidéo AVI – LatisPro</title>

<style>
body {font-family:Arial;background:#f3e8ff;color:#2d0052;padding:24px;}
.container{max-width:900px;margin:auto;background:white;border:4px solid #6d10b1;border-radius:18px;padding:24px;}
h1{text-align:center;color:#4b0082;}
button{background:#6d10b1;color:white;border:none;border-radius:12px;padding:14px 22px;font-size:18px;cursor:pointer;margin-top:18px;}
.status,.result,.error{margin-top:18px;padding:14px;border-radius:12px;}
.status{background:#eef7ff;border-left:6px solid #2979ff;}
.result{background:#eefbea;border-left:6px solid #2e7d32;}
.error{background:#fff1f1;border-left:6px solid #c62828;}
.footer{text-align:center;margin-top:25px;color:#6d10b1;}
</style>
</head>

<body>

<div class="container">
<h1>🎥 Convertisseur AVI – LatisPro</h1>

<input type="file" id="videoInput" accept="video/*"><br>
<button id="convertBtn">Lancer la conversion</button>

<div id="status" class="status"></div>
<div id="result" class="result"></div>
<div id="error" class="error"></div>

<div class="footer">
Virginie Fourcassier. Lycée Pierre de Fermat. Toulouse
</div>
</div>

<script type="module">
import { FFmpeg } from "https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js";
import { fetchFile, toBlobURL } from "https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js";

const btn = document.getElementById("convertBtn");
const input = document.getElementById("videoInput");
const status = document.getElementById("status");
const result = document.getElementById("result");
const error = document.getElementById("error");

const ffmpeg = new FFmpeg();

async function loadFFmpeg() {
    const base = "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm";

    await ffmpeg.load({
        coreURL: await toBlobURL(`${base}/ffmpeg-core.js`, "text/javascript"),
        wasmURL: await toBlobURL(`${base}/ffmpeg-core.wasm`, "application/wasm"),
        workerURL: "/ffmpeg/worker.js"   // 🔥 CORRECTION MAJEURE
    });
}

btn.onclick = async () => {
    error.innerHTML = "";
    result.innerHTML = "";

    const file = input.files[0];
    if (!file) {
        error.innerHTML = "❌ Aucun fichier.";
        return;
    }

    status.innerHTML = "⏳ Chargement FFmpeg...";
    await loadFFmpeg();

    status.innerHTML = "📥 Chargement vidéo...";
    await ffmpeg.writeFile("input", await fetchFile(file));

    status.innerHTML = "⚙️ Conversion en cours...";

    await ffmpeg.exec([
        "-i","input",
        "-t","90",
        "-an",
        "-vcodec","mjpeg",
        "-q:v","2",
        "-r","25",
        "output.avi"
    ]);

    const data = await ffmpeg.readFile("output.avi");
    const url = URL.createObjectURL(new Blob([data.buffer]));

    result.innerHTML = `<a href="${url}" download="video_pour_latispro.avi">⬇️ Télécharger</a>`;
    status.innerHTML = "✅ Terminé";
};
</script>

</body>
</html>
